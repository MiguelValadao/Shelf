name: shelf_app
description: App de gestão de biblioteca pessoal com scanner de ISBN e quotes via OCR.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend / Banco de dados
  supabase_flutter: ^2.5.6
  flutter_dotenv: ^5.1.0

  # Scanner de código de barras (ISBN)
  mobile_scanner: ^5.2.3

  # OCR para captura de quotes
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # HTTP para falar com o backend Python
  http: ^1.2.1

  # Utilitários
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
